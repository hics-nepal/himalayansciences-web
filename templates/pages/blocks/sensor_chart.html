{% load static %}
<div class="data-widget" style="margin:var(--s5) 0;">
  <div class="data-widget__header">
    <div class="data-widget__title">
      {{ value.station_id }} · {{ value.sensor|upper }}
      {% if value.caption %}— {{ value.caption }}{% endif %}
    </div>
    <div class="text-mono text-muted" style="font-size:0.75rem;">Last {{ value.hours }}h</div>
  </div>
  <div class="chart-wrap" id="chart-{{ value.station_id }}-{{ value.sensor }}"></div>
</div>
<script>
(function() {
  var stationId = "{{ value.station_id }}";
  var sensor = "{{ value.sensor }}";
  var hours = {{ value.hours }};
  var containerId = "chart-" + stationId + "-" + sensor;

  fetch("/api/data/historical/?station=" + stationId + "&hours=" + hours)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var container = document.getElementById(containerId);
      if (!container || !data.length) {
        container.innerHTML = '<p class="text-muted text-mono" style="font-size:0.8rem;padding:1rem;">No data available.</p>';
        return;
      }
      var values = data.map(function(d) { return d[sensor]; }).filter(function(v) { return v !== null; });
      if (!values.length) return;
      var min = Math.min.apply(null, values);
      var max = Math.max.apply(null, values);
      var range = max - min || 1;
      var w = container.offsetWidth || 600;
      var h = 200;
      var pts = data.map(function(d, i) {
        var x = (i / (data.length - 1)) * w;
        var y = h - ((d[sensor] - min) / range) * (h - 20) - 10;
        return x + "," + y;
      }).join(" ");
      container.innerHTML =
        '<svg viewBox="0 0 ' + w + ' ' + h + '" width="100%" height="100%" preserveAspectRatio="none">' +
        '<polyline points="' + pts + '" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.9"/>' +
        '</svg>';
    })
    .catch(function() {});
})();
</script>
